<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RF04 - Mantenimiento de Productos (Móvil)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        /* Simulación de imagen para el wireframe */
        .wireframe-img {
            background-image: repeating-linear-gradient(45deg, #f3f4f6 25%, transparent 25%, transparent 75%, #f3f4f6 75%, #f3f4f6), repeating-linear-gradient(45deg, #f3f4f6 25%, #fff 25%, #fff 75%, #f3f4f6 75%, #f3f4f6);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 pb-10">

    <header class="bg-black text-white p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
        <button class="text-white hover:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="font-bold text-lg tracking-widest flex items-center">
            ADIDAS <span class="font-normal text-xs text-gray-400 ml-1">ADMIN</span>
        </div>
        <button class="text-white hover:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
    </header>

    <div class="p-4 space-y-6">

        <div>
            <h2 class="text-xl font-bold text-black">Catálogo de Zapatillas</h2>
            <p class="text-xs text-gray-500 mt-1">Gestión de modelos y stock.</p>
        </div>

        <div class="space-y-3">
            <button class="w-full bg-black text-white px-4 py-3 rounded-md text-sm font-bold flex justify-center items-center hover:bg-gray-800 transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Nueva Zapatilla
            </button>
            <div class="relative">
                <svg class="w-4 h-4 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Buscar por modelo o ID..." class="w-full border border-gray-400 bg-white pl-9 pr-4 py-2.5 rounded-md text-sm focus:outline-none focus:border-black">
            </div>
            <select class="w-full border border-gray-400 bg-white px-4 py-2.5 rounded-md text-sm focus:outline-none focus:border-black appearance-none relative">
                <option>Todas las categorías</option>
                <option>Originals</option>
                <option>Performance</option>
                <option>Sportswear</option>
            </select>
        </div>

        <div class="space-y-5">

            <div class="bg-white border border-gray-300 rounded-xl overflow-hidden shadow-sm flex flex-col">
                <div class="h-40 wireframe-img relative flex items-center justify-center border-b border-gray-200">
                    <div class="absolute top-2 left-2 bg-white border border-gray-400 px-2 py-0.5 rounded text-[10px] font-bold text-black">ADIDAS</div>
                    <div class="absolute top-2 right-2 bg-black px-2 py-0.5 rounded text-[10px] font-bold text-white">UNISEX</div>
                    <span class="text-gray-400 font-mono text-xs">[Imagen Producto]</span>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Originals</span>
                            <h3 class="text-base font-bold text-black leading-tight">Adidas Samba OG</h3>
                        </div>
                        <span class="text-[10px] text-gray-400 font-mono">ID: #1042</span>
                    </div>
                    
                    <div class="flex justify-between bg-gray-50 rounded-lg p-3 my-3 border border-gray-200">
                        <div class="text-center">
                            <span class="block text-[10px] text-gray-500 uppercase">Variaciones</span>
                            <span class="block text-sm font-bold text-black">4</span>
                        </div>
                        <div class="w-px bg-gray-300"></div>
                        <div class="text-center">
                            <span class="block text-[10px] text-gray-500 uppercase">Stock Total</span>
                            <span class="block text-sm font-bold text-black">120 u.</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2">
                        <button class="col-span-1 border border-gray-400 text-gray-600 rounded flex items-center justify-center py-2.5 hover:bg-gray-50 transition" title="Editar">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button class="col-span-2 bg-gray-100 border border-gray-300 text-black rounded text-xs font-bold py-2.5 hover:bg-gray-200 transition">Ver Variaciones</button>
                        <button class="col-span-1 border border-gray-400 text-gray-600 rounded flex items-center justify-center py-2.5 hover:bg-gray-50 transition" title="Eliminar">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-300 rounded-xl overflow-hidden shadow-sm flex flex-col">
                <div class="h-40 wireframe-img relative flex items-center justify-center border-b border-gray-200">
                    <div class="absolute top-2 left-2 bg-white border border-gray-400 px-2 py-0.5 rounded text-[10px] font-bold text-black">ADIDAS</div>
                    <div class="absolute top-2 right-2 bg-black px-2 py-0.5 rounded text-[10px] font-bold text-white">HOMBRE</div>
                    <span class="text-gray-400 font-mono text-xs">[Imagen Producto]</span>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Performance</span>
                            <h3 class="text-base font-bold text-black leading-tight">Ultraboost Light</h3>
                        </div>
                        <span class="text-[10px] text-gray-400 font-mono">ID: #1043</span>
                    </div>
                    
                    <div class="flex justify-between bg-gray-50 rounded-lg p-3 my-3 border border-gray-200">
                        <div class="text-center">
                            <span class="block text-[10px] text-gray-500 uppercase">Variaciones</span>
                            <span class="block text-sm font-bold text-black">6</span>
                        </div>
                        <div class="w-px bg-gray-300"></div>
                        <div class="text-center">
                            <span class="block text-[10px] text-gray-500 uppercase">Stock Total</span>
                            <span class="block text-sm font-bold text-black">45 u.</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2">
                        <button class="col-span-1 border border-gray-400 text-gray-600 rounded flex items-center justify-center py-2.5 hover:bg-gray-50 transition" title="Editar">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button class="col-span-2 bg-gray-100 border border-gray-300 text-black rounded text-xs font-bold py-2.5 hover:bg-gray-200 transition">Ver Variaciones</button>
                        <button class="col-span-1 border border-gray-400 text-gray-600 rounded flex items-center justify-center py-2.5 hover:bg-gray-50 transition" title="Eliminar">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm flex flex-col animate-pulse">
                <div class="h-40 bg-gray-200 relative"></div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div class="w-full">
                            <div class="h-2 bg-gray-200 rounded w-1/4 mb-2"></div>
                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                        </div>
                        <div class="h-2 bg-gray-200 rounded w-10"></div>
                    </div>
                    
                    <div class="h-14 bg-gray-100 rounded-lg my-3 border border-gray-100"></div>

                    <div class="grid grid-cols-4 gap-2 mt-2">
                        <div class="col-span-1 h-9 bg-gray-200 rounded"></div>
                        <div class="col-span-2 h-9 bg-gray-200 rounded"></div>
                        <div class="col-span-1 h-9 bg-gray-200 rounded"></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-6 flex items-center justify-between bg-white border border-gray-300 p-3 rounded-lg shadow-sm">
            <button class="text-sm text-gray-400 font-medium">Anterior</button>
            <span class="text-xs text-gray-600">1 / 5</span>
            <button class="text-sm text-black font-bold">Siguiente</button>
        </div>

    </div>
</body>
</html>
