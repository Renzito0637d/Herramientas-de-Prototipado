<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RF12 - Agencias de Transporte (Móvil)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 pb-10">

    <header class="bg-black text-white p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
        <button class="text-white hover:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="font-bold text-lg tracking-widest flex items-center">
            ADIDAS <span class="font-normal text-xs text-gray-400 ml-1">ADMIN</span>
        </div>
        <button class="text-white hover:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
    </header>

    <div class="p-4 space-y-6">

        <div>
            <h2 class="text-xl font-bold text-black">Agencias de Transporte</h2>
            <p class="text-xs text-gray-500 mt-1">Gestión de couriers y zonas de cobertura.</p>
        </div>

        <div class="flex flex-col space-y-3 mb-2">
            <button class="w-full bg-black text-white px-4 py-3 rounded-md text-sm font-bold flex justify-center items-center hover:bg-gray-800 transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Agregar Agencia
            </button>
            <div class="relative">
                <svg class="w-4 h-4 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Buscar courier..." class="w-full border border-gray-400 bg-white pl-9 pr-4 py-2.5 rounded-md text-sm focus:outline-none focus:border-black">
            </div>
            <select class="w-full border border-gray-400 bg-white px-4 py-2.5 rounded-md text-sm focus:outline-none focus:border-black appearance-none relative text-gray-700">
                <option>Todas las zonas</option>
                <option>Lima Metropolitana</option>
                <option>Provincias (Norte)</option>
                <option>Provincias (Sur)</option>
            </select>
        </div>

        <div class="space-y-4">
            
            <div class="bg-white border border-gray-300 rounded-lg p-4 shadow-sm relative">
                <span class="absolute top-4 right-4 px-2 py-1 bg-black border border-black text-[10px] font-bold text-white rounded">ACTIVO</span>
                <div class="flex items-center space-x-2 mb-2">
                    <div class="w-8 h-8 bg-gray-200 border border-gray-300 rounded flex items-center justify-center">
                        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 font-mono">ID: LOG-001</p>
                        <h3 class="text-base font-bold text-black leading-tight">Urbano Express</h3>
                    </div>
                </div>
                
                <div class="bg-gray-50 p-3 rounded mt-3 border border-gray-200 space-y-2">
                    <div class="flex items-start">
                        <svg class="w-4 h-4 text-gray-400 mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <div>
                            <span class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider">Zonas Asignadas</span>
                            <span class="text-xs font-medium text-black">Lima Metropolitana, Callao</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        <span class="text-xs font-medium text-black">(01) 715-2020</span>
                    </div>
                </div>
                
                <div class="flex justify-between border-t border-gray-100 pt-3 mt-3">
                    <button class="flex-1 flex justify-center text-gray-500 hover:text-black" title="Editar">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                    <button class="flex-1 flex justify-center text-gray-500 hover:text-black border-l border-gray-200" title="Eliminar">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            </div>

            <div class="bg-white border border-gray-300 rounded-lg p-4 shadow-sm relative opacity-75">
                <span class="absolute top-4 right-4 px-2 py-1 bg-gray-100 border border-gray-300 text-[10px] font-bold text-gray-500 rounded">INACTIVO</span>
                <div class="flex items-center space-x-2 mb-2">
                    <div class="w-8 h-8 bg-gray-200 border border-gray-300 rounded flex items-center justify-center">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-mono">ID: LOG-003</p>
                        <h3 class="text-base font-bold text-gray-500 leading-tight">Shalom Express</h3>
                    </div>
                </div>
                
                <div class="bg-gray-50 p-3 rounded mt-3 border border-gray-200 space-y-2">
                    <div class="flex items-start">
                        <svg class="w-4 h-4 text-gray-300 mr-2 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <div>
                            <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Zonas Asignadas</span>
                            <span class="text-xs font-medium text-gray-500">Norte (Trujillo, Piura)</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-between border-t border-gray-100 pt-3 mt-3">
                    <button class="flex-1 flex justify-center text-gray-400 hover:text-black" title="Editar">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                    <button class="flex-1 flex justify-center text-gray-400 hover:text-black border-l border-gray-200" title="Eliminar">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            </div>

            <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm animate-pulse">
                <div class="flex items-center space-x-2 mb-2">
                    <div class="w-8 h-8 bg-gray-200 rounded"></div>
                    <div>
                        <div class="h-2 bg-gray-200 rounded w-16 mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded w-32"></div>
                    </div>
                </div>
                
                <div class="bg-gray-100 p-3 rounded mt-3 border border-gray-100 space-y-3">
                    <div class="h-3 bg-gray-200 rounded w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
                
                <div class="flex justify-between border-t border-gray-100 pt-3 mt-3">
                    <div class="flex-1 flex justify-center"><div class="w-5 h-5 bg-gray-200 rounded"></div></div>
                    <div class="flex-1 flex justify-center border-l border-gray-100"><div class="w-5 h-5 bg-gray-200 rounded"></div></div>
                </div>
            </div>

        </div>
        
        <div class="mt-4 flex items-center justify-between bg-white border border-gray-300 p-3 rounded-lg shadow-sm">
            <button class="text-sm text-gray-400 font-medium">Anterior</button>
            <span class="text-xs text-gray-600">Pág 1 de 1</span>
            <button class="text-sm text-gray-400 font-medium">Siguiente</button>
        </div>

    </div>
</body>
</html>
