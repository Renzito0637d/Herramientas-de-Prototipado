<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RF03 - Gestión de Perfiles (Móvil - Una Captura)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden flex flex-col">

    <header class="bg-black text-white p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
        <button class="text-white hover:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="font-bold text-lg tracking-widest flex items-center">
            ADIDAS
        </div>
        <button class="text-white hover:text-gray-300 relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">2</span>
        </button>
    </header>

    <div class="p-4 flex-1 overflow-y-auto">

        <div class="mb-5 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-black">Mi Perfil</h2>
                <p class="text-xs text-gray-500 mt-1">jeffri03444@gmail.com</p>
            </div>
            <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center font-bold text-gray-600 text-lg border-2 border-white shadow-sm">JF</div>
        </div>

        <div class="space-y-3">
            
            <div class="bg-white border border-gray-300 rounded-lg shadow-sm overflow-hidden">
                <div class="bg-gray-50 px-4 py-3 flex justify-between items-center border-b border-gray-200">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <h3 class="text-sm font-bold text-black">Datos de la Cuenta</h3>
                    </div>
                    <svg class="w-5 h-5 text-black transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="p-4">
                    <form class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Nombre</label>
                                <input type="text" value="Jeffri" class="w-full border border-gray-400 bg-white px-2 py-1.5 rounded text-sm focus:outline-none focus:border-black">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Apellido</label>
                                <input type="text" value="Fernandez" class="w-full border border-gray-400 bg-white px-2 py-1.5 rounded text-sm focus:outline-none focus:border-black">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-1">Teléfono Móvil</label>
                            <input type="tel" value="951823847" class="w-full border border-gray-400 bg-white px-2 py-1.5 rounded text-sm focus:outline-none focus:border-black">
                        </div>
                        <button type="button" class="w-full bg-black text-white px-4 py-2 mt-2 rounded text-sm font-bold hover:bg-gray-800 transition">
                            Actualizar Datos
                        </button>
                    </form>
                </div>
            </div>

            <div class="bg-white border border-gray-300 rounded-lg shadow-sm">
                <div class="px-4 py-3 flex justify-between items-center cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <div>
                            <h3 class="text-sm font-bold text-black">Libreta de Direcciones</h3>
                            <p class="text-[10px] text-gray-500">1 dirección guardada</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>

            <div class="bg-white border border-gray-300 rounded-lg shadow-sm">
                <div class="px-4 py-3 flex justify-between items-center cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                        <div>
                            <h3 class="text-sm font-bold text-black">Métodos de Pago</h3>
                            <p class="text-[10px] text-gray-500">Visa terminada en 4582</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>

            <div class="bg-white border border-gray-300 rounded-lg shadow-sm">
                <div class="px-4 py-3 flex justify-between items-center cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <div>
                            <h3 class="text-sm font-bold text-black">Preferencias</h3>
                            <p class="text-[10px] text-gray-500">Notificaciones y seguridad</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>

        </div>
        
        <div class="mt-6">
            <button class="w-full border border-gray-300 bg-white text-black px-4 py-3 rounded-lg text-sm font-bold flex justify-center items-center hover:bg-gray-50 transition">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Cerrar Sesión
            </button>
        </div>

    </div>
</body>
</html>
